

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>What is an AI Agent?</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-width: 100vw;
            box-sizing: border-box;
            background-color: #0F172A;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            min-width: 100vw;
            min-height: 100vh;
            background-color: #0F172A; /* Slate 900 */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            box-sizing: border-box;
        }
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 1;
        }
        .content-wrapper {
            z-index: 10;
            text-align: center;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #F8FAFC;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 2rem;
            color: #94A3B8; /* Slate 400 */
            font-weight: 300;
            max-width: 800px;
        }
        .highlight {
            color: #38BDF8; /* Sky 400 */
            font-weight: 600;
        }
        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background-color: #38BDF8;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }
        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }
        .circle-2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
        }
        .icon-container {
            font-size: 4rem;
            color: #38BDF8;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }
        .divider {
            width: 100px;
            height: 4px;
            background-color: #38BDF8;
            margin: 0 auto;
            border-radius: 2px;
        }
        .tag-pill {
            background-color: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38BDF8;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Decorative Elements -->
<div class="grid-pattern"></div>
<div class="decorative-circle circle-1"></div>
<div class="decorative-circle circle-2"></div>
<div class="content-wrapper">
<!-- Icons representing LLM + Code -->
<div class="icon-container">
<i class="fa-solid fa-brain"></i>
<span style="font-size: 2rem; color: #64748B;">+</span>
<i class="fa-solid fa-code"></i>
</div>
<div>
<h1 class="title">What is an <br/><span class="highlight">AI Agent?</span></h1>
</div>
<div class="divider"></div>
<div>
<p class="subtitle">The Architecture of Autonomous Systems</p>
<div class="flex justify-center gap-4 mt-6">
<span class="tag-pill">LLM</span>
<span class="tag-pill">Tools</span>
<span class="tag-pill">Actions</span>
<span class="tag-pill">Memory</span>
<span class="tag-pill">Persona</span>
</div>
</div>
</div>
</div>
</body>
</html>
